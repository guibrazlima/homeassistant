views:
  - title: "⚡ BMW i4"
    icon: mdi:ev-station
    path: ev-charging
    type: masonry
    cards:

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 1 — HERO STATUS
      # ══════════════════════════════════════════════════════════════
      - type: custom:button-card
        entity: sensor.ev_estado_carregamento
        name: BMW i4 eDrive40
        icon: mdi:car-electric
        show_label: true
        show_state: true
        label: >
          [[[ return `🔋 ${states['sensor.battery_hv_state_of_charge'].state}%  →  🎯 ${states['sensor.battery_ev_target_state_of_charge'].state}%   •   🛣️ ${states['sensor.ev_autonomia_estimada_km'].state} km` ]]]
        styles:
          card:
            - background: >
                [[[
                  const ws = states['sensor.wallbox_state'].state;
                  if (ws.includes('3:')) return 'linear-gradient(135deg,#0a2e1a 0%,#1a5c35 60%,#22863a 100%)';
                  if (ws.includes('2:')) return 'linear-gradient(135deg,#0a1628 0%,#1a3a6b 60%,#2563be 100%)';
                  return 'linear-gradient(135deg,#0f0f1a 0%,#1a1a2e 60%,#24243e 100%)';
                ]]]
            - border-radius: 20px
            - padding: 28px 24px
            - box-shadow: 0 8px 32px rgba(0,0,0,0.35)
          icon:
            - color: >
                [[[
                  const ws = states['sensor.wallbox_state'].state;
                  if (ws.includes('3:')) return '#4ade80';
                  if (ws.includes('2:')) return '#60a5fa';
                  return '#94a3b8';
                ]]]
            - width: 72px
          name:
            - font-size: 24px
            - font-weight: 800
            - color: white
          state:
            - font-size: 15px
            - color: '#86efac'
            - font-weight: 600
            - margin-top: 4px
          label:
            - font-size: 14px
            - color: '#cbd5e1'
            - margin-top: 8px

      # ══════════════════════════════════════════════════════════════
      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 2 — BARRA DE PROGRESSO SOC
      # ══════════════════════════════════════════════════════════════
      - type: markdown
        card_mod:
          style: |
            ha-card {
              background: linear-gradient(135deg,#0f172a,#1e293b) !important;
              border-radius: 16px !important;
              box-shadow: 0 4px 16px rgba(0,0,0,0.25) !important;
              padding: 20px 24px !important;
            }
        content: >
          {% set soc = states('sensor.battery_hv_state_of_charge') | float(0) %}
          {% set target = states('sensor.battery_ev_target_state_of_charge') | float(80) %}
          {% set power = states('sensor.wallbox_charging_power') | float(0) %}
          {% set color = '#4ade80' if soc >= target else '#fbbf24' if soc >= 60 else '#f87171' %}
          {% set pct = [soc, 100] | min %}
          {% set charging = power > 100 %}
          <div style="text-align:center;color:white">
            <div style="font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Estado da Bateria</div>
            <div style="font-size:48px;font-weight:900;color:{{ color }};line-height:1">{{ soc | round(0) | int }}%</div>
            {% if charging %}<span style="display:inline-block;background:#4ade8033;border:1px solid #4ade8066;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;color:#4ade80;margin-top:6px">⚡ A CARREGAR</span>{% endif %}
            <div style="font-size:16px;font-weight:700;color:#60a5fa;margin-top:6px">Alvo: {{ target | round(0) | int }}%</div>
            <div style="background:#1e3a5f;border-radius:99px;height:20px;position:relative;overflow:hidden;margin-top:12px">
              <div style="width:{{ pct }}%;height:100%;background:linear-gradient(90deg,{{ color }},{{ color }}bb);border-radius:99px"></div>
              <div style="position:absolute;top:50%;left:{{ [target,99] | min }}%;transform:translate(-50%,-50%);width:3px;height:26px;background:#60a5fa;border-radius:2px"></div>
              <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;font-weight:700;color:white">{{ pct | round(0) | int }}%</div>
            </div>
            <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:#64748b">
              <span>0%</span><span style="color:#60a5fa">▲ alvo {{ target | round(0) | int }}%</span><span>100%</span>
            </div>
          </div>

      # SECÇÃO 3 — 4 CHIPS PRINCIPAIS
      # ══════════════════════════════════════════════════════════════
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: >
              {{ (states('sensor.wallbox_charging_power') | float(0) / 1000) | round(2) }} kW
            secondary: "⚡ Potência"
            icon: mdi:flash
            icon_color: blue

          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.ev_tempo_restante_min') | int(0) }} min"
            secondary: "⏱️ Restante"
            icon: mdi:timer-outline
            icon_color: orange

          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.ev_custo_sessao_estimado') | float(0) | round(3) }} €"
            secondary: "💶 Custo est."
            icon: mdi:currency-eur
            icon_color: green

          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.wallbox_session_energy') | float(0) | round(2) }} kWh"
            secondary: "🔢 Sessão"
            icon: mdi:counter
            icon_color: teal

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 4 — GRÁFICO POTÊNCIA
      # ══════════════════════════════════════════════════════════════
      - type: custom:apexcharts-card
        header:
          show: true
          title: "⚡ Potência de Carregamento (12h)"
          show_states: true
          colorize_states: true
        graph_span: 12h
        span:
          start: hour
          offset: "-11h"
        now:
          show: true
          label: agora
          color: "#94a3b8"
        apex_config:
          chart:
            type: area
            height: 170
            toolbar:
              show: false
            background: transparent
          fill:
            type: gradient
            gradient:
              opacityFrom: 0.55
              opacityTo: 0.02
          stroke:
            curve: smooth
            width: 2.5
          dataLabels:
            enabled: false
          grid:
            borderColor: "#f1f5f9"
            strokeDashArray: 3
          xaxis:
            labels:
              format: "HH:mm"
          yaxis:
            labels:
              formatter: "EVAL:function(v){return v.toFixed(1)+' kW'}"
            min: 0
        series:
          - entity: sensor.wallbox_charging_power
            name: "Potência"
            color: "#3b82f6"
            extend_to: now
            transform: "return x / 1000"
            unit: kW

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 5 — SOC 24h
      # ══════════════════════════════════════════════════════════════
      - type: custom:mini-graph-card
        name: "🔋 SOC Bateria (24h)"
        icon: mdi:battery-charging-80
        entities:
          - entity: sensor.battery_hv_state_of_charge
            name: SOC Actual
            color: "#22c55e"
          - entity: sensor.battery_ev_target_state_of_charge
            name: SOC Alvo
            color: "#3b82f6"
            show_fill: false
            show_points: false
        hours_to_show: 24
        points_per_hour: 4
        line_width: 2
        hour24: true
        show:
          legend: true
          fill: fade

      # ══════════════════════════════════════════════════════════════
      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 6 — ORIGEM DA ENERGIA
      # ══════════════════════════════════════════════════════════════
      - type: markdown
        card_mod:
          style: |
            ha-card {
              background: linear-gradient(135deg,#1c1209,#2d1f0a,#3d2b0d) !important;
              border-radius: 16px !important;
              box-shadow: 0 4px 16px rgba(0,0,0,0.25) !important;
              padding: 20px 24px !important;
            }
        content: >
          {% set solar = states('sensor.power_production_now') | float(0) %}
          {% set wallbox = states('sensor.wallbox_charging_power') | float(0) %}
          {% set solar_pct = ((solar / wallbox * 100) | round(0) | int) if wallbox > 0 else 0 %}
          {% set solar_pct = [solar_pct, 100] | min %}
          {% set m_solar = states('sensor.ev_energia_carregamento_solar_monthly') | float(0) %}
          {% set m_total = states('sensor.ev_energy_monthly') | float(0) %}
          {% set m_pct = ((m_solar / m_total * 100) | round(0) | int) if m_total > 0 else 0 %}
          <div style="text-align:center;color:white">
            <div style="font-size:13px;font-weight:700;color:#fbbf24;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px">☀️ Origem da Energia</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
              <div style="background:#451a03aa;border:1px solid #92400e55;border-radius:12px;padding:12px;text-align:center">
                <div style="font-size:10px;color:#fde68a;font-weight:700;text-transform:uppercase">☀️ Solar agora</div>
                <div style="font-size:28px;font-weight:900;color:#fbbf24">{{ solar | round(0) | int }} W</div>
                <div style="font-size:11px;color:#d97706">{{ solar_pct }}% do carregamento</div>
              </div>
              <div style="background:#172554aa;border:1px solid #1e40af55;border-radius:12px;padding:12px;text-align:center">
                <div style="font-size:10px;color:#93c5fd;font-weight:700;text-transform:uppercase">🔌 Wallbox</div>
                <div style="font-size:28px;font-weight:900;color:#60a5fa">{{ (wallbox / 1000) | round(2) }} kW</div>
                <div style="font-size:11px;color:#3b82f6">potência actual</div>
              </div>
            </div>
            <div style="background:#1c1c2eaa;border:1px solid #374151;border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:12px;color:#94a3b8;font-weight:600">☀️ Solar este mês</span>
              <span style="font-size:16px;font-weight:800;color:#fbbf24">{{ m_solar | round(2) }} kWh ({{ m_pct }}%)</span>
            </div>
          </div>

      # SECÇÃO 7 — PREÇOS COOPÉRNICO
      # ══════════════════════════════════════════════════════════════
      - type: custom:apexcharts-card
        header:
          show: true
          title: "💶 Preços Energia — Hoje (Coopérnico)"
          show_states: true
          colorize_states: true
        graph_span: 24h
        span:
          start: day
        now:
          show: true
          label: Agora
          color: "#ef4444"
        apex_config:
          chart:
            type: bar
            height: 190
            toolbar:
              show: false
            background: transparent
          plotOptions:
            bar:
              borderRadius: 3
              columnWidth: 95%
          dataLabels:
            enabled: false
          grid:
            borderColor: "#f1f5f9"
            strokeDashArray: 3
          xaxis:
            labels:
              format: "HH:mm"
              rotate: -45
          yaxis:
            labels:
              formatter: "EVAL:function(v){return v.toFixed(3)+'€'}"
            min: 0
          tooltip:
            theme: light
            y:
              formatter: "EVAL:function(v){return v.toFixed(4)+' €/kWh'}"
        series:
          - entity: sensor.coopernico_base_bi_horario_ciclo_diario_today_prices
            name: "€/kWh c/IVA"
            color: |
              EVAL:function(v){return v<0.09?'#22c55e':v<0.12?'#f59e0b':'#ef4444'}
            data_generator: |
              return entity.attributes.prices.map(p=>({
                x: new Date(p.datetime).getTime(),
                y: p.price_w_vat
              }));

      # ══════════════════════════════════════════════════════════════
      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 8 — PLANO DE CARREGAMENTO
      # ══════════════════════════════════════════════════════════════
      - type: markdown
        card_mod:
          style: |
            ha-card {
              background: linear-gradient(135deg,#0f172a,#1e293b) !important;
              border-radius: 16px !important;
              box-shadow: 0 4px 16px rgba(0,0,0,0.25) !important;
              padding: 20px 24px !important;
            }
        content: >
          {% set scheduled = is_state('input_boolean.ev_charging_scheduled', 'on') %}
          {% set start_raw = states('input_datetime.ev_charging_start') %}
          {% set end_raw = states('input_datetime.ev_charging_end') %}
          {% set deadline_raw = states('input_datetime.ev_charging_deadline') %}
          {% set kwh = states('sensor.ev_kwh_necessarios') | float(0) %}
          {% set cost = states('sensor.ev_previsao_custo_hoje') | float(0) %}
          {% set price = states('sensor.ev_custo_por_kwh_estimado') | float(0) %}
          {% macro fmt(s) %}{% if s in ['unknown','unavailable',''] %}—{% else %}{{ s[11:16] }}{% endif %}{% endmacro %}
          {% set sc = '#4ade80' if scheduled else '#fbbf24' %}
          {% set st = '✅ Agendado' if scheduled else '⏳ A calcular' %}
          <div style="color:white">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
              <div style="font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1px">🗓️ Plano de Carregamento</div>
              <div style="background:{{ sc }}22;border:1px solid {{ sc }}55;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;color:{{ sc }}">{{ st }}</div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:14px">
              <div style="text-align:center;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:10px 4px">
                <div style="font-size:9px;color:#64748b;font-weight:600;text-transform:uppercase;margin-bottom:4px">Início</div>
                <div style="font-size:20px;font-weight:800;color:#60a5fa">{{ fmt(start_raw) }}</div>
              </div>
              <div style="text-align:center;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:10px 4px">
                <div style="font-size:9px;color:#64748b;font-weight:600;text-transform:uppercase;margin-bottom:4px">Fim</div>
                <div style="font-size:20px;font-weight:800;color:#a78bfa">{{ fmt(end_raw) }}</div>
              </div>
              <div style="text-align:center;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:10px 4px">
                <div style="font-size:9px;color:#64748b;font-weight:600;text-transform:uppercase;margin-bottom:4px">kWh</div>
                <div style="font-size:20px;font-weight:800;color:#fbbf24">{{ kwh | round(1) }}</div>
              </div>
              <div style="text-align:center;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:10px 4px">
                <div style="font-size:9px;color:#64748b;font-weight:600;text-transform:uppercase;margin-bottom:4px">Deadline</div>
                <div style="font-size:20px;font-weight:800;color:#f87171">{{ fmt(deadline_raw) }}</div>
              </div>
            </div>
            <div style="background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px 14px">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
                <div><div style="font-size:10px;color:#64748b;font-weight:600;text-transform:uppercase">Previsão custo hoje</div>
                  <div style="font-size:28px;font-weight:900;color:#4ade80">{{ cost | round(3) }} €</div></div>
                <div style="text-align:right"><div style="font-size:10px;color:#64748b;font-weight:600;text-transform:uppercase">Preço médio janela</div>
                  <div style="font-size:18px;font-weight:700;color:#94a3b8">{{ price | round(4) }} €/kWh</div></div>
              </div>
              <div style="font-size:10px;color:#475569;background:#0f172a;border-radius:6px;padding:6px 8px">
                📐 {{ kwh | round(2) }} kWh × preço médio da janela mais barata = custo estimado
              </div>
            </div>
          </div>

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 9 — CUSTOS ACUMULADOS
      # ══════════════════════════════════════════════════════════════
      - type: markdown
        card_mod:
          style: |
            ha-card {
              background: linear-gradient(135deg,#0a1628,#132342,#1a3a6b) !important;
              border-radius: 16px !important;
              box-shadow: 0 4px 16px rgba(0,0,0,0.25) !important;
              padding: 20px 24px !important;
            }
        content: >
          {% set dk = states('sensor.ev_energy_daily') | float(0) %}
          {% set wk = states('sensor.ev_energy_weekly') | float(0) %}
          {% set mk = states('sensor.ev_energy_monthly') | float(0) %}
          {% set yk = states('sensor.ev_energy_yearly') | float(0) %}
          {% set de = states('sensor.ev_custo_diario_estimado') | float(0) %}
          {% set we = states('sensor.ev_custo_semanal_estimado') | float(0) %}
          {% set me = states('sensor.ev_custo_mensal_estimado') | float(0) %}
          {% set ye = states('sensor.ev_custo_anual_estimado') | float(0) %}
          {% set c100 = states('sensor.ev_custo_por_100km') | float(0) %}
          <div style="text-align:center;color:white">
            <div style="font-size:13px;font-weight:700;color:#93c5fd;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px">💰 Energia &amp; Custos Acumulados</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
              <div style="background:#1e3a8a44;border-radius:12px;padding:12px 8px;text-align:center">
                <div style="font-size:16px">📅</div>
                <div style="font-size:10px;color:#94a3b8;font-weight:700;text-transform:uppercase;margin-top:2px">Hoje</div>
                <div style="font-size:18px;font-weight:900;color:#93c5fd;margin-top:4px">{{ dk | round(2) }} kWh</div>
                <div style="font-size:14px;font-weight:700;color:#93c5fdbb">{{ de | round(2) }} €</div>
              </div>
              <div style="background:#78350f44;border-radius:12px;padding:12px 8px;text-align:center">
                <div style="font-size:16px">📆</div>
                <div style="font-size:10px;color:#94a3b8;font-weight:700;text-transform:uppercase;margin-top:2px">Semana</div>
                <div style="font-size:18px;font-weight:900;color:#fde68a;margin-top:4px">{{ wk | round(2) }} kWh</div>
                <div style="font-size:14px;font-weight:700;color:#fde68abb">{{ we | round(2) }} €</div>
              </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
              <div style="background:#14532d44;border-radius:12px;padding:12px 8px;text-align:center">
                <div style="font-size:16px">🗓️</div>
                <div style="font-size:10px;color:#94a3b8;font-weight:700;text-transform:uppercase;margin-top:2px">Mês</div>
                <div style="font-size:18px;font-weight:900;color:#86efac;margin-top:4px">{{ mk | round(2) }} kWh</div>
                <div style="font-size:14px;font-weight:700;color:#86efacbb">{{ me | round(2) }} €</div>
              </div>
              <div style="background:#581c8744;border-radius:12px;padding:12px 8px;text-align:center">
                <div style="font-size:16px">📊</div>
                <div style="font-size:10px;color:#94a3b8;font-weight:700;text-transform:uppercase;margin-top:2px">Ano</div>
                <div style="font-size:18px;font-weight:900;color:#d8b4fe;margin-top:4px">{{ yk | round(2) }} kWh</div>
                <div style="font-size:14px;font-weight:700;color:#d8b4febb">{{ ye | round(2) }} €</div>
              </div>
            </div>
            <div style="background:#1e293b;border:1px solid #334155;border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:12px;color:#94a3b8;font-weight:600">🚗 Custo por 100 km</span>
              <span style="font-size:18px;font-weight:800;color:#fbbf24">{{ c100 | round(2) }} €</span>
            </div>
          </div>

      # SECÇÃO 10 — GRÁFICO CUSTO DIÁRIO
      # ══════════════════════════════════════════════════════════════
      - type: custom:mini-graph-card
        name: "💶 Custo Diário Estimado (30 dias)"
        icon: mdi:chart-line
        entities:
          - entity: sensor.ev_custo_diario_estimado
            name: Custo diário
            color: "#22c55e"
        hours_to_show: 720
        points_per_hour: 0.04
        line_width: 2
        hour24: true
        show:
          legend: false
          fill: fade
          points: false

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 11 — CONTROLOS
      # ══════════════════════════════════════════════════════════════
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: input_boolean.ev_smart_charging_enabled
            name: "Inteligente"
            icon: mdi:brain
            tap_action:
              action: toggle

          - type: custom:mushroom-entity-card
            entity: input_datetime.ev_charging_deadline
            name: "Deadline"
            icon: mdi:clock-alert
            tap_action:
              action: more-info

          - type: custom:mushroom-entity-card
            entity: select.wallbox_phase_mode
            name: "Fases"
            icon: mdi:sine-wave
            tap_action:
              action: more-info

      - type: horizontal-stack
        cards:
          - type: custom:button-card
            name: "🔍 Calcular Janela"
            styles:
              card:
                - border-radius: 14px
                - background: 'linear-gradient(135deg,#1e3a8a,#2563eb)'
                - padding: 14px
              name:
                - color: white
                - font-weight: 700
                - font-size: 13px
            tap_action:
              action: call-service
              service: script.turn_on
              service_data:
                entity_id: script.ev_calcular_janela_otima

          - type: custom:button-card
            name: "⚡ Safety Net"
            styles:
              card:
                - border-radius: 14px
                - background: 'linear-gradient(135deg,#78350f,#d97706)'
                - padding: 14px
              name:
                - color: white
                - font-weight: 700
                - font-size: 13px
            tap_action:
              action: call-service
              service: script.turn_on
              service_data:
                entity_id: script.ev_ativar_safety_net

          - type: custom:button-card
            name: "⏹️ Parar Regra"
            styles:
