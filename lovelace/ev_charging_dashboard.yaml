views:
  - title: "⚡ BMW i4"
    icon: mdi:ev-station
    path: ev-charging
    type: masonry
    cards:

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 1 — HERO STATUS
      # ══════════════════════════════════════════════════════════════
      - type: custom:button-card
        entity: sensor.ev_estado_carregamento
        name: BMW i4 eDrive40
        icon: mdi:car-electric
        show_label: true
        show_state: true
        label: >
          [[[ return `🔋 ${states['sensor.battery_hv_state_of_charge'].state}%  →  🎯 ${states['sensor.battery_ev_target_state_of_charge'].state}%   •   🛣️ ${states['sensor.ev_autonomia_estimada_km'].state} km` ]]]
        styles:
          card:
            - background: >
                [[[
                  const ws = states['sensor.wallbox_state'].state;
                  if (ws.includes('3:')) return 'linear-gradient(135deg,#0a2e1a 0%,#1a5c35 60%,#22863a 100%)';
                  if (ws.includes('2:')) return 'linear-gradient(135deg,#0a1628 0%,#1a3a6b 60%,#2563be 100%)';
                  return 'linear-gradient(135deg,#0f0f1a 0%,#1a1a2e 60%,#24243e 100%)';
                ]]]
            - border-radius: 20px
            - padding: 28px 24px
            - box-shadow: 0 8px 32px rgba(0,0,0,0.35)
          icon:
            - color: >
                [[[
                  const ws = states['sensor.wallbox_state'].state;
                  if (ws.includes('3:')) return '#4ade80';
                  if (ws.includes('2:')) return '#60a5fa';
                  return '#94a3b8';
                ]]]
            - width: 72px
          name:
            - font-size: 24px
            - font-weight: 800
            - color: white
          state:
            - font-size: 15px
            - color: '#86efac'
            - font-weight: 600
            - margin-top: 4px
          label:
            - font-size: 14px
            - color: '#cbd5e1'
            - margin-top: 8px

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 2 — BARRA DE PROGRESSO SOC
      # ══════════════════════════════════════════════════════════════
      - type: custom:button-card
        show_name: false
        show_icon: false
        show_state: false
        card_mod:
          style: |
            ha-card { display: block !important; }
        styles:
          card:
            - padding: 20px 24px
            - border-radius: 16px
            - background: 'linear-gradient(135deg,#0f172a,#1e293b)'
            - box-shadow: 0 4px 16px rgba(0,0,0,0.25)
          custom_fields:
            bar:
              - width: 100%
        custom_fields:
          bar: >
            [[[
              var soc = parseFloat((states['sensor.battery_hv_state_of_charge'] || {}).state) || 0;
              var target = parseFloat((states['sensor.battery_ev_target_state_of_charge'] || {}).state) || 80;
              var power = parseFloat((states['sensor.wallbox_charging_power'] || {}).state) || 0;
              var color = soc >= target ? '#4ade80' : soc >= 60 ? '#fbbf24' : '#f87171';
              var pct = Math.min(soc, 100);
              var isCharging = power > 100;
              var chargingBadge = isCharging ? '<span style="background:#4ade8033;border:1px solid #4ade8066;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;color:#4ade80;margin-left:8px">⚡ A CARREGAR</span>' : '';
              return '<div style="color:white;text-align:center">' +
                '<div style="text-align:center;margin-bottom:12px">' +
                  '<div style="font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Estado da Bateria</div>' +
                  '<div><span style="font-size:48px;font-weight:900;color:' + color + '">' + Math.round(soc) + '%</span></div>' +
                  chargingBadge +
                  '<div style="font-size:16px;font-weight:700;color:#60a5fa;margin-top:4px">Alvo: ' + Math.round(target) + '%</div>' +
                '</div>' +
                '<div style="background:#1e3a5f;border-radius:99px;height:20px;position:relative;overflow:hidden">' +
                  '<div style="width:' + pct + '%;height:100%;background:linear-gradient(90deg,' + color + ',' + color + 'bb);border-radius:99px"></div>' +
                  '<div style="position:absolute;top:50%;left:' + Math.min(target,99) + '%;transform:translate(-50%,-50%);width:3px;height:26px;background:#60a5fa;border-radius:2px"></div>' +
                  '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:11px;font-weight:700;color:white">' + Math.round(pct) + '%</div>' +
                '</div>' +
                '<div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:#64748b">' +
                  '<span>0%</span><span style="color:#60a5fa">▲ alvo ' + Math.round(target) + '%</span><span>100%</span>' +
                '</div>' +
              '</div>';
            ]]]

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 3 — 4 CHIPS PRINCIPAIS
      # ══════════════════════════════════════════════════════════════
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: >
              {{ (states('sensor.wallbox_charging_power') | float(0) / 1000) | round(2) }} kW
            secondary: "⚡ Potência"
            icon: mdi:flash
            icon_color: blue

          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.ev_tempo_restante_min') | int(0) }} min"
            secondary: "⏱️ Restante"
            icon: mdi:timer-outline
            icon_color: orange

          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.ev_custo_sessao_estimado') | float(0) | round(3) }} €"
            secondary: "💶 Custo est."
            icon: mdi:currency-eur
            icon_color: green

          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.wallbox_session_energy') | float(0) | round(2) }} kWh"
            secondary: "🔢 Sessão"
            icon: mdi:counter
            icon_color: teal

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 4 — GRÁFICO POTÊNCIA
      # ══════════════════════════════════════════════════════════════
      - type: custom:apexcharts-card
        header:
          show: true
          title: "⚡ Potência de Carregamento (12h)"
          show_states: true
          colorize_states: true
        graph_span: 12h
        span:
          start: hour
          offset: "-11h"
        now:
          show: true
          label: agora
          color: "#94a3b8"
        apex_config:
          chart:
            type: area
            height: 170
            toolbar:
              show: false
            background: transparent
          fill:
            type: gradient
            gradient:
              opacityFrom: 0.55
              opacityTo: 0.02
          stroke:
            curve: smooth
            width: 2.5
          dataLabels:
            enabled: false
          grid:
            borderColor: "#f1f5f9"
            strokeDashArray: 3
          xaxis:
            labels:
              format: "HH:mm"
          yaxis:
            labels:
              formatter: "EVAL:function(v){return v.toFixed(1)+' kW'}"
            min: 0
        series:
          - entity: sensor.wallbox_charging_power
            name: "Potência"
            color: "#3b82f6"
            extend_to: now
            transform: "return x / 1000"
            unit: kW

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 5 — SOC 24h
      # ══════════════════════════════════════════════════════════════
      - type: custom:mini-graph-card
        name: "🔋 SOC Bateria (24h)"
        icon: mdi:battery-charging-80
        entities:
          - entity: sensor.battery_hv_state_of_charge
            name: SOC Actual
            color: "#22c55e"
          - entity: sensor.battery_ev_target_state_of_charge
            name: SOC Alvo
            color: "#3b82f6"
            show_fill: false
            show_points: false
        hours_to_show: 24
        points_per_hour: 4
        line_width: 2
        hour24: true
        show:
          legend: true
          fill: fade

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 6 — ORIGEM DA ENERGIA
      # ══════════════════════════════════════════════════════════════
      - type: custom:button-card
        show_name: false
        show_icon: false
        show_state: false
        card_mod:
          style: |
            ha-card { display: block !important; }
        styles:
          card:
            - padding: 20px 24px
            - border-radius: 16px
            - background: 'linear-gradient(135deg,#1c1209,#2d1f0a,#3d2b0d)'
            - box-shadow: 0 4px 16px rgba(0,0,0,0.25)
          custom_fields:
            origem:
              - width: 100%
        custom_fields:
          origem: >
            [[[
              var solar = parseFloat((states['sensor.power_production_now'] || {}).state) || 0;
              var wallbox = parseFloat((states['sensor.wallbox_charging_power'] || {}).state) || 0;
              var solarPct = wallbox > 0 ? Math.min(100, Math.round(solar / wallbox * 100)) : 0;
              var monthlySolar = parseFloat((states['sensor.ev_energia_carregamento_solar_monthly'] || {}).state) || 0;
              var monthlyTotal = parseFloat((states['sensor.ev_energy_monthly'] || {}).state) || 0;
              var monthlyPct = monthlyTotal > 0 ? Math.round(monthlySolar / monthlyTotal * 100) : 0;
              return '<div style="text-align:center">' +
                '<div style="font-size:13px;font-weight:700;color:#fbbf24;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px;text-align:center">☀️ Origem da Energia</div>' +
                '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;text-align:center">' +
                  '<div style="background:#451a03aa;border:1px solid #92400e55;border-radius:12px;padding:12px;text-align:center">' +
                    '<div style="font-size:10px;color:#fde68a;font-weight:700;text-transform:uppercase">☀️ Solar agora</div>' +
                    '<div style="font-size:28px;font-weight:900;color:#fbbf24">' + solar.toFixed(0) + ' W</div>' +
                    '<div style="font-size:11px;color:#d97706">' + solarPct + '% do carregamento</div>' +
                  '</div>' +
                  '<div style="background:#172554aa;border:1px solid #1e40af55;border-radius:12px;padding:12px;text-align:center">' +
                    '<div style="font-size:10px;color:#93c5fd;font-weight:700;text-transform:uppercase">🔌 Wallbox</div>' +
                    '<div style="font-size:28px;font-weight:900;color:#60a5fa">' + (wallbox/1000).toFixed(2) + ' kW</div>' +
                    '<div style="font-size:11px;color:#3b82f6">potência actual</div>' +
                  '</div>' +
                '</div>' +
                '<div style="background:#1c1c2eaa;border:1px solid #374151;border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center">' +
                  '<span style="font-size:12px;color:#94a3b8;font-weight:600">☀️ Solar este mês</span>' +
                  '<span style="font-size:16px;font-weight:800;color:#fbbf24">' + monthlySolar.toFixed(2) + ' kWh (' + monthlyPct + '%)</span>' +
                '</div>' +
              '</div>';
            ]]]

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 7 — PREÇOS COOPÉRNICO
      # ══════════════════════════════════════════════════════════════
      - type: custom:apexcharts-card
        header:
          show: true
          title: "💶 Preços Energia — Hoje (Coopérnico)"
          show_states: true
          colorize_states: true
        graph_span: 24h
        span:
          start: day
        now:
          show: true
          label: Agora
          color: "#ef4444"
        apex_config:
          chart:
            type: bar
            height: 190
            toolbar:
              show: false
            background: transparent
          plotOptions:
            bar:
              borderRadius: 3
              columnWidth: 95%
          dataLabels:
            enabled: false
          grid:
            borderColor: "#f1f5f9"
            strokeDashArray: 3
          xaxis:
            labels:
              format: "HH:mm"
              rotate: -45
          yaxis:
            labels:
              formatter: "EVAL:function(v){return v.toFixed(3)+'€'}"
            min: 0
          tooltip:
            theme: light
            y:
              formatter: "EVAL:function(v){return v.toFixed(4)+' €/kWh'}"
        series:
          - entity: sensor.coopernico_base_bi_horario_ciclo_diario_today_prices
            name: "€/kWh c/IVA"
            color: |
              EVAL:function(v){return v<0.09?'#22c55e':v<0.12?'#f59e0b':'#ef4444'}
            data_generator: |
              return entity.attributes.prices.map(p=>({
                x: new Date(p.datetime).getTime(),
                y: p.price_w_vat
              }));

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 8 — PLANO DE CARREGAMENTO (dark)
      # ══════════════════════════════════════════════════════════════
      - type: custom:button-card
        show_name: false
        show_icon: false
        show_state: false
        card_mod:
          style: |
            ha-card { display: block !important; }
        styles:
          card:
            - padding: 20px 24px
            - border-radius: 16px
            - background: 'linear-gradient(135deg,#0f172a,#1e293b)'
            - box-shadow: 0 4px 16px rgba(0,0,0,0.25)
          custom_fields:
            plano:
              - width: 100%
        custom_fields:
          plano: >
            [[[
              var scheduled = (states['input_boolean.ev_charging_scheduled'] || {}).state === 'on';
              var startRaw = (states['input_datetime.ev_charging_start'] || {}).state || '';
              var endRaw = (states['input_datetime.ev_charging_end'] || {}).state || '';
              var deadline = ((states['input_datetime.ev_charging_deadline'] || {}).state || '').substring(11,16);
              var kwh = parseFloat((states['sensor.ev_kwh_necessarios'] || {}).state) || 0;
              var cost = parseFloat((states['sensor.ev_previsao_custo_hoje'] || {}).state) || 0;
              var price = parseFloat((states['sensor.ev_custo_por_kwh_estimado'] || {}).state) || 0;
              var statusColor = scheduled ? '#4ade80' : '#fbbf24';
              var statusText = scheduled ? '✅ Agendado' : '⏳ A calcular';
              var fmtTime = function(s) {
                if (!s || s === 'unknown' || s === 'unavailable') return '—';
                return s.substring(11,16);
              };
              return '<div style="width:100%;max-width:100%;margin:0 auto;text-align:left">' +
                '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">' +
                  '<div style="font-size:14px;font-weight:700;color:white;text-transform:uppercase;letter-spacing:1px">🗓️ Plano de Carregamento</div>' +
                  '<div style="background:' + statusColor + '22;border:1px solid ' + statusColor + '55;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;color:' + statusColor + '">' + statusText + '</div>' +
                '</div>' +
                '<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:14px">' +
                  '<div style="text-align:center;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:10px 4px">' +
                    '<div style="font-size:9px;color:#64748b;font-weight:600;text-transform:uppercase;margin-bottom:4px">Início</div>' +
                    '<div style="font-size:20px;font-weight:800;color:#60a5fa">' + fmtTime(startRaw) + '</div>' +
                  '</div>' +
                  '<div style="text-align:center;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:10px 4px">' +
                    '<div style="font-size:9px;color:#64748b;font-weight:600;text-transform:uppercase;margin-bottom:4px">Fim</div>' +
                    '<div style="font-size:20px;font-weight:800;color:#a78bfa">' + fmtTime(endRaw) + '</div>' +
                  '</div>' +
                  '<div style="text-align:center;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:10px 4px">' +
                    '<div style="font-size:9px;color:#64748b;font-weight:600;text-transform:uppercase;margin-bottom:4px">kWh</div>' +
                    '<div style="font-size:20px;font-weight:800;color:#fbbf24">' + kwh.toFixed(1) + '</div>' +
                  '</div>' +
                  '<div style="text-align:center;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:10px 4px">' +
                    '<div style="font-size:9px;color:#64748b;font-weight:600;text-transform:uppercase;margin-bottom:4px">Deadline</div>' +
                    '<div style="font-size:20px;font-weight:800;color:#f87171">' + deadline + '</div>' +
                  '</div>' +
                '</div>' +
                '<div style="background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px 14px">' +
                  '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">' +
                    '<div><div style="font-size:10px;color:#64748b;font-weight:600;text-transform:uppercase">Previsão custo hoje</div>' +
                      '<div style="font-size:28px;font-weight:900;color:#4ade80">' + cost.toFixed(3) + ' €</div></div>' +
                    '<div style="text-align:right"><div style="font-size:10px;color:#64748b;font-weight:600;text-transform:uppercase">Preço médio janela</div>' +
                      '<div style="font-size:18px;font-weight:700;color:#94a3b8">' + price.toFixed(4) + ' €/kWh</div></div>' +
                  '</div>' +
                  '<div style="font-size:10px;color:#475569;background:#0f172a;border-radius:6px;padding:6px 8px">' +
                    '📐 ' + kwh.toFixed(2) + ' kWh × preço médio da janela mais barata de hoje = custo estimado' +
                  '</div>' +
                '</div>' +
              '</div>';
            ]]]

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 9 — CUSTOS ACUMULADOS
      # ══════════════════════════════════════════════════════════════
      - type: custom:button-card
        show_name: false
        show_icon: false
        show_state: false
        card_mod:
          style: |
            ha-card { display: block !important; }
        styles:
          card:
            - padding: 20px 24px
            - border-radius: 16px
            - background: 'linear-gradient(135deg,#0a1628,#132342,#1a3a6b)'
            - box-shadow: 0 4px 16px rgba(0,0,0,0.25)
          custom_fields:
            custos:
              - width: 100%
        custom_fields:
          custos: >
            [[[
              var g = function(e) { return parseFloat((states[e] || {}).state) || 0; };
              var dk = g('sensor.ev_energy_daily');
              var wk = g('sensor.ev_energy_weekly');
              var mk = g('sensor.ev_energy_monthly');
              var yk = g('sensor.ev_energy_yearly');
              var de = g('sensor.ev_custo_diario_estimado');
              var we = g('sensor.ev_custo_semanal_estimado');
              var me = g('sensor.ev_custo_mensal_estimado');
              var ye = g('sensor.ev_custo_anual_estimado');
              var c100 = g('sensor.ev_custo_por_100km');
              var card = function(icon, label, kwh, eur, bg, tc) {
                return '<div style="background:' + bg + ';border-radius:12px;padding:12px 8px;text-align:center">' +
                  '<div style="font-size:16px">' + icon + '</div>' +
                  '<div style="font-size:10px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px">' + label + '</div>' +
                  '<div style="font-size:18px;font-weight:900;color:' + tc + ';margin-top:4px">' + kwh.toFixed(2) + ' kWh</div>' +
                  '<div style="font-size:14px;font-weight:700;color:' + tc + 'bb">' + eur.toFixed(2) + ' €</div>' +
                '</div>';
              };
              return '<div style="text-align:center">' +
                '<div style="font-size:13px;font-weight:700;color:#93c5fd;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px;text-align:center">💰 Energia &amp; Custos Acumulados</div>' +
                '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;text-align:center">' +
                  card('📅','Hoje', dk, de,'#1e3a8a44','#93c5fd') +
                  card('📆','Semana', wk, we,'#78350f44','#fde68a') +
                '</div>' +
                '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">' +
                  card('🗓️','Mês', mk, me,'#14532d44','#86efac') +
                  card('📊','Ano', yk, ye,'#581c8744','#d8b4fe') +
                '</div>' +
                '<div style="background:#1e293b;border:1px solid #334155;border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center">' +
                  '<span style="font-size:12px;color:#94a3b8;font-weight:600;text-align:center">🚗 Custo por 100 km</span>' +
                  '<span style="font-size:18px;font-weight:800;color:#fbbf24">' + c100.toFixed(2) + ' €</span>' +
                '</div>' +
              '</div>';
            ]]]

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 10 — GRÁFICO CUSTO DIÁRIO
      # ══════════════════════════════════════════════════════════════
      - type: custom:mini-graph-card
        name: "💶 Custo Diário Estimado (30 dias)"
        icon: mdi:chart-line
        entities:
          - entity: sensor.ev_custo_diario_estimado
            name: Custo diário
            color: "#22c55e"
        hours_to_show: 720
        points_per_hour: 0.04
        line_width: 2
        hour24: true
        show:
          legend: false
          fill: fade
          points: false

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 11 — CONTROLOS
      # ══════════════════════════════════════════════════════════════
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: input_boolean.ev_smart_charging_enabled
            name: "Inteligente"
            icon: mdi:brain
            tap_action:
              action: toggle

          - type: custom:mushroom-entity-card
            entity: input_datetime.ev_charging_deadline
            name: "Deadline"
            icon: mdi:clock-alert
            tap_action:
              action: more-info

          - type: custom:mushroom-entity-card
            entity: select.wallbox_phase_mode
            name: "Fases"
            icon: mdi:sine-wave
            tap_action:
              action: more-info

      - type: horizontal-stack
        cards:
          - type: custom:button-card
            name: "🔍 Calcular Janela"
            styles:
              card:
                - border-radius: 14px
                - background: 'linear-gradient(135deg,#1e3a8a,#2563eb)'
                - padding: 14px
              name:
                - color: white
                - font-weight: 700
                - font-size: 13px
            tap_action:
              action: call-service
              service: script.turn_on
              service_data:
                entity_id: script.ev_calcular_janela_otima

          - type: custom:button-card
            name: "⚡ Safety Net"
            styles:
