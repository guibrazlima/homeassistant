views:
  - title: "⚡ BMW i4"
    icon: mdi:ev-station
    path: ev-charging
    type: masonry
    cards:

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 1 — HERO STATUS
      # ══════════════════════════════════════════════════════════════
      - type: custom:button-card
        entity: sensor.ev_estado_carregamento
        name: BMW i4 eDrive40
        icon: mdi:car-electric
        show_label: true
        show_state: true
        label: >
          [[[ return `🔋 ${states['sensor.battery_hv_state_of_charge'].state}%  →  🎯 ${states['sensor.battery_ev_target_state_of_charge'].state}%   •   🛣️ ${states['sensor.ev_autonomia_estimada_km'].state} km` ]]]
        styles:
          card:
            - background: >
                [[[
                  const ws = states['sensor.wallbox_state'].state;
                  if (ws.includes('3:')) return 'linear-gradient(135deg,#0a2e1a 0%,#1a5c35 60%,#22863a 100%)';
                  if (ws.includes('2:')) return 'linear-gradient(135deg,#0a1628 0%,#1a3a6b 60%,#2563be 100%)';
                  return 'linear-gradient(135deg,#0f0f1a 0%,#1a1a2e 60%,#24243e 100%)';
                ]]]
            - border-radius: 20px
            - padding: 28px 24px
            - box-shadow: 0 8px 32px rgba(0,0,0,0.35)
          icon:
            - color: >
                [[[
                  const ws = states['sensor.wallbox_state'].state;
                  if (ws.includes('3:')) return '#4ade80';
                  if (ws.includes('2:')) return '#60a5fa';
                  return '#94a3b8';
                ]]]
            - width: 72px
            - filter: >
                [[[
                  const ws = states['sensor.wallbox_state'].state;
                  if (ws.includes('3:')) return 'drop-shadow(0 0 12px #4ade8088)';
                  if (ws.includes('2:')) return 'drop-shadow(0 0 12px #60a5fa88)';
                  return 'none';
                ]]]
          name:
            - font-size: 24px
            - font-weight: 800
            - color: white
            - letter-spacing: 0.5px
          state:
            - font-size: 15px
            - color: >
                [[[
                  const ws = states['sensor.wallbox_state'].state;
                  if (ws.includes('3:')) return '#86efac';
                  if (ws.includes('2:')) return '#93c5fd';
                  return '#94a3b8';
                ]]]
            - font-weight: 600
            - margin-top: 4px
          label:
            - font-size: 14px
            - color: '#cbd5e1'
            - margin-top: 8px

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 2 — ESTADO DA BATERIA (barra + info)
      # ══════════════════════════════════════════════════════════════
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.battery_hv_state_of_charge') | int }}%"
            secondary: "🔋 SOC Actual"
            icon: mdi:battery-charging
            icon_color: >
              {% set s = states('sensor.battery_hv_state_of_charge') | int %}
              {% if s >= 80 %}green{% elif s >= 50 %}orange{% else %}red{% endif %}
            badge_icon: >
              {% if '3:' in states('sensor.wallbox_state') %}mdi:flash{% endif %}
            badge_color: amber
            multiline_secondary: false

          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.battery_ev_target_state_of_charge') | int }}%"
            secondary: "🎯 SOC Alvo"
            icon: mdi:battery-check
            icon_color: blue

          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.ev_autonomia_estimada_km') | int }} km"
            secondary: "🛣️ Autonomia"
            icon: mdi:map-marker-distance
            icon_color: purple

      - type: custom:mushroom-template-card
        primary: >
          {% set soc = states('sensor.battery_hv_state_of_charge') | int %}
          {% set target = states('sensor.battery_ev_target_state_of_charge') | int %}
          {% set pct = [(soc / target * 100), 100] | min | int if target > 0 else 0 %}
          {{ soc }}% carregado — faltam {{ [target - soc, 0] | max }}% para o alvo ({{ target }}%)
        secondary: >
          {% set kwh = states('sensor.ev_kwh_necessarios') | float(0) %}
          {% set mins = states('sensor.ev_tempo_restante_min') | int(0) %}
          {% if kwh > 0 %}⚡ {{ kwh }} kWh necessários • ⏱️ ~{{ mins }} min{% else %}✅ Bateria no alvo{% endif %}
        icon: mdi:battery-charging-80
        icon_color: >
          {% set soc = states('sensor.battery_hv_state_of_charge') | int %}
          {% set target = states('sensor.battery_ev_target_state_of_charge') | int %}
          {% if soc >= target %}green{% elif soc >= 60 %}orange{% else %}red{% endif %}
        multiline_secondary: true

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 3 — 4 CHIPS PRINCIPAIS
      # ══════════════════════════════════════════════════════════════
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: >
              {{ (states('sensor.wallbox_charging_power') | float(0) / 1000) | round(2) }} kW
            secondary: "⚡ Potência"
            icon: mdi:flash
            icon_color: blue

          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.ev_tempo_restante_min') | int(0) }} min"
            secondary: "⏱️ Restante"
            icon: mdi:timer-outline
            icon_color: orange

          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.ev_custo_sessao_estimado') | float(0) | round(3) }} €"
            secondary: "💶 Custo est."
            icon: mdi:currency-eur
            icon_color: green

          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.wallbox_session_energy') | float(0) | round(2) }} kWh"
            secondary: "🔢 Sessão"
            icon: mdi:counter
            icon_color: teal

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 4 — GRÁFICO POTÊNCIA
      # ══════════════════════════════════════════════════════════════
      - type: custom:apexcharts-card
        header:
          show: true
          title: "⚡ Potência de Carregamento (12h)"
          show_states: true
          colorize_states: true
        graph_span: 12h
        span:
          start: hour
          offset: "-11h"
        now:
          show: true
          label: agora
          color: "#94a3b8"
        apex_config:
          chart:
            type: area
            height: 170
            toolbar:
              show: false
            background: transparent
          fill:
            type: gradient
            gradient:
              opacityFrom: 0.55
              opacityTo: 0.02
          stroke:
            curve: smooth
            width: 2.5
          dataLabels:
            enabled: false
          grid:
            borderColor: "#f1f5f9"
            strokeDashArray: 3
          xaxis:
            labels:
              format: "HH:mm"
          yaxis:
            labels:
              formatter: "EVAL:function(v){return v.toFixed(1)+' kW'}"
            min: 0
        series:
          - entity: sensor.wallbox_charging_power
            name: "Potência"
            color: "#3b82f6"
            extend_to: now
            transform: "return x / 1000"
            unit: kW

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 5 — SOC 24h
      # ══════════════════════════════════════════════════════════════
      - type: custom:mini-graph-card
        name: "🔋 SOC Bateria (24h)"
        icon: mdi:battery-charging-80
        entities:
          - entity: sensor.battery_hv_state_of_charge
            name: SOC Actual
            color: "#22c55e"
          - entity: sensor.battery_ev_target_state_of_charge
            name: SOC Alvo
            color: "#3b82f6"
            show_fill: false
            show_points: false
        hours_to_show: 24
        points_per_hour: 4
        line_width: 2
        hour24: true
        show:
          legend: true
          fill: fade

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 6 — ORIGEM DA ENERGIA
      # ══════════════════════════════════════════════════════════════
      - type: entities
        title: "☀️ Origem da Energia"
        icon: mdi:solar-power
        show_header_toggle: false
        entities:
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.power_production_now') | int(0) }} W"
            secondary: "☀️ Solar agora (Solcast)"
            icon: mdi:solar-power-variant
            icon_color: amber
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.solax_swr7gyllef_ac_power') | int(0) }} W"
            secondary: "🔆 Inversor Solax AC"
            icon: mdi:lightning-bolt
            icon_color: yellow
          - type: custom:mushroom-template-card
            primary: >
              {% set total = states('sensor.ev_energy_monthly') | float(0) %}
              {% set solar = states('sensor.ev_energia_carregamento_solar_monthly') | float(0) %}
              {% if total > 0 %}{{ (solar / total * 100) | round(1) }}%{% else %}—{% endif %}
            secondary: "☀️ % Solar no carregamento (mês)"
            icon: mdi:percent
            icon_color: green
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.ev_energia_carregamento_solar_monthly') | float(0) | round(2) }} kWh"
            secondary: "☀️ Solar carregado (mês)"
            icon: mdi:counter
            icon_color: orange

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 7 — PREÇOS COOPÉRNICO
      # ══════════════════════════════════════════════════════════════
      - type: custom:apexcharts-card
        header:
          show: true
          title: "💶 Preços Energia — Hoje (Coopérnico)"
          show_states: true
          colorize_states: true
        graph_span: 24h
        span:
          start: day
        now:
          show: true
          label: Agora
          color: "#ef4444"
        apex_config:
          chart:
            type: bar
            height: 190
            toolbar:
              show: false
            background: transparent
          plotOptions:
            bar:
              borderRadius: 3
              columnWidth: 95%
          dataLabels:
            enabled: false
          grid:
            borderColor: "#f1f5f9"
            strokeDashArray: 3
          xaxis:
            labels:
              format: "HH:mm"
              rotate: -45
          yaxis:
            labels:
              formatter: "EVAL:function(v){return v.toFixed(3)+'€'}"
            min: 0
          tooltip:
            theme: light
            y:
              formatter: "EVAL:function(v){return v.toFixed(4)+' €/kWh'}"
        series:
          - entity: sensor.coopernico_base_bi_horario_ciclo_diario_today_prices
            name: "€/kWh c/IVA"
            color: |
              EVAL:function(v){return v<0.09?'#22c55e':v<0.12?'#f59e0b':'#ef4444'}
            data_generator: |
              return entity.attributes.prices.map(p=>({
                x: new Date(p.datetime).getTime(),
                y: p.price_w_vat
              }));

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 8 — PLANO DE CARREGAMENTO
      # ══════════════════════════════════════════════════════════════
      - type: custom:mushroom-template-card
        primary: >
          {% set scheduled = is_state('input_boolean.ev_charging_scheduled', 'on') %}
          {% if scheduled %}✅ Carga Agendada{% else %}⏳ A Calcular Janela{% endif %}
        secondary: >
          {% set start = states('input_datetime.ev_charging_start') %}
          {% set end = states('input_datetime.ev_charging_end') %}
          {% set kwh = states('sensor.ev_kwh_necessarios') | float(0) %}
          {% set cost = states('sensor.ev_previsao_custo_hoje') | float(0) %}
          {% if start not in ['unknown','unavailable',''] %}
            🕐 {{ as_timestamp(start)|timestamp_custom('%H:%M') }} → {{ as_timestamp(end)|timestamp_custom('%H:%M') }}  •  ⚡ {{ kwh }} kWh  •  💶 ~{{ cost | round(3) }} €
          {% else %}
            Deadline: {{ states('input_datetime.ev_charging_deadline').split(':')[:2]|join(':') }}  •  ⚡ {{ kwh }} kWh necessários
          {% endif %}
        icon: mdi:calendar-clock
        icon_color: >
          {% if is_state('input_boolean.ev_charging_scheduled', 'on') %}green{% else %}orange{% endif %}
        multiline_secondary: true

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-template-card
            primary: >
              {% set s = states('input_datetime.ev_charging_start') %}
              {% if s not in ['unknown','unavailable',''] %}{{ as_timestamp(s)|timestamp_custom('%H:%M') }}{% else %}—{% endif %}
            secondary: "🟢 Início"
            icon: mdi:clock-start
            icon_color: green

          - type: custom:mushroom-template-card
            primary: >
              {% set e = states('input_datetime.ev_charging_end') %}
              {% if e not in ['unknown','unavailable',''] %}{{ as_timestamp(e)|timestamp_custom('%H:%M') }}{% else %}—{% endif %}
            secondary: "🔵 Fim"
            icon: mdi:clock-end
            icon_color: blue

          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.ev_kwh_necessarios') }} kWh"
            secondary: "⚡ Necessário"
            icon: mdi:battery-charging-50
            icon_color: orange

          - type: custom:mushroom-template-card
            primary: "{{ states('input_datetime.ev_charging_deadline').split(':')[:2]|join(':') }}"
            secondary: "🔴 Deadline"
            icon: mdi:clock-alert
            icon_color: red

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 9 — ENERGIA ACUMULADA (kWh)
      # ══════════════════════════════════════════════════════════════
      - type: entities
        title: "🔢 Energia Acumulada"
        icon: mdi:counter
        show_header_toggle: false
        entities:
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.ev_energy_daily') | float(0) | round(3) }} kWh"
            secondary: "📅 Hoje"
            icon: mdi:calendar-today
            icon_color: blue
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.ev_energy_weekly') | float(0) | round(2) }} kWh"
            secondary: "📆 Esta semana"
            icon: mdi:calendar-week
            icon_color: amber
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.ev_energy_monthly') | float(0) | round(2) }} kWh"
            secondary: "🗓️ Este mês"
            icon: mdi:calendar-month
            icon_color: green
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.ev_energy_yearly') | float(0) | round(1) }} kWh"
            secondary: "📊 Este ano"
            icon: mdi:chart-bar
            icon_color: purple

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 10 — CUSTOS ACUMULADOS (€)
      # ══════════════════════════════════════════════════════════════
      - type: entities
        title: "💰 Custos de Carregamento"
        icon: mdi:currency-eur
        show_header_toggle: false
        entities:
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.ev_custo_diario_estimado') | float(0) | round(3) }} €"
            secondary: "📅 Hoje  •  {{ states('sensor.ev_energy_daily') | float(0) | round(3) }} kWh"
            icon: mdi:calendar-today
            icon_color: blue
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.ev_custo_semanal_estimado') | float(0) | round(2) }} €"
            secondary: "📆 Esta semana  •  {{ states('sensor.ev_energy_weekly') | float(0) | round(2) }} kWh"
            icon: mdi:calendar-week
            icon_color: amber
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.ev_custo_mensal_estimado') | float(0) | round(2) }} €"
            secondary: "🗓️ Este mês  •  {{ states('sensor.ev_energy_monthly') | float(0) | round(2) }} kWh"
            icon: mdi:calendar-month
            icon_color: green
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.ev_custo_anual_estimado') | float(0) | round(2) }} €"
            secondary: "📊 Este ano  •  {{ states('sensor.ev_energy_yearly') | float(0) | round(1) }} kWh"
            icon: mdi:chart-bar
            icon_color: purple
          - type: custom:mushroom-template-card
            primary: "{{ states('sensor.ev_custo_por_100km') | float(0) | round(2) }} €"
            secondary: "🚗 Por 100 km  •  {{ states('sensor.ev_custo_por_kwh_estimado') | float(0) | round(4) }} €/kWh"
            icon: mdi:road
            icon_color: teal

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 11 — GRÁFICO CUSTO DIÁRIO
      # ══════════════════════════════════════════════════════════════
      - type: custom:mini-graph-card
        name: "💶 Custo Diário Estimado (30 dias)"
        icon: mdi:chart-line
        entities:
          - entity: sensor.ev_custo_diario_estimado
            name: Custo diário
            color: "#22c55e"
        hours_to_show: 720
        points_per_hour: 0.04
        line_width: 2
        hour24: true
        show:
          legend: false
          fill: fade
          points: false

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 12 — CONTROLOS
      # ══════════════════════════════════════════════════════════════
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: input_boolean.ev_smart_charging_enabled
            name: "Inteligente"
            icon: mdi:brain
            tap_action:
              action: toggle

          - type: custom:mushroom-entity-card
            entity: input_datetime.ev_charging_deadline
            name: "Deadline"
            icon: mdi:clock-alert
            tap_action:
              action: more-info

          - type: custom:mushroom-entity-card
            entity: select.wallbox_phase_mode
            name: "Fases"
            icon: mdi:sine-wave
            tap_action:
              action: more-info

      - type: horizontal-stack
        cards:
          - type: custom:button-card
            name: "🔍 Calcular Janela"
            styles:
              card:
                - border-radius: 14px
                - background: 'linear-gradient(135deg,#dbeafe,#bfdbfe)'
                - padding: 14px
              name:
                - color: '#1e40af'
                - font-weight: 700
                - font-size: 13px
            tap_action:
              action: call-service
              service: script.turn_on
              service_data:
                entity_id: script.ev_calcular_janela_otima

          - type: custom:button-card
            name: "⚡ Safety Net"
            styles:
              card:
                - border-radius: 14px
                - background: 'linear-gradient(135deg,#fef9c3,#fde68a)'
                - padding: 14px
              name:
                - color: '#78350f'
                - font-weight: 700
                - font-size: 13px
            tap_action:
              action: call-service
              service: script.turn_on
              service_data:
                entity_id: script.ev_ativar_safety_net

          - type: custom:button-card
            name: "⏹️ Parar Regra"
            styles:
              card:
                - border-radius: 14px
                - background: 'linear-gradient(135deg,#fee2e2,#fecaca)'
                - padding: 14px
              name:
                - color: '#7f1d1d'
                - font-weight: 700
                - font-size: 13px
            tap_action:
              action: call-service
              service: script.turn_on
              service_data:
                entity_id: script.ev_desativar_regra_ev

      # ══════════════════════════════════════════════════════════════
      # SECÇÃO 13 — DETALHES WALLBOX
      # ══════════════════════════════════════════════════════════════
      - type: entities
        title: "🔌 Wallbox — Detalhes"
        icon: mdi:ev-station
        show_header_toggle: false
        entities:
          - entity: sensor.wallbox_state
            name: Estado (IEC 61851)
          - entity: sensor.wallbox_charging_power
            name: "⚡ Potência actual"
          - entity: sensor.wallbox_current_l1
            name: "〰️ Corrente L1"
          - entity: sensor.wallbox_session_energy
            name: "🔢 Energia sessão"
          - entity: sensor.wallbox_used_phases
            name: "〰️ Fases activas"
          - entity: sensor.wallbox_cp_state
            name: "🔗 Estado CP"
          - entity: sensor.wallbox_pause_reason
            name: "⏸️ Motivo pausa"
          - entity: sensor.wallbox_total_charging_duration
            name: "⏱️ Duração total"
          - entity: number.wallbox_current_limit_override
            name: "🎚️ Limite corrente"
